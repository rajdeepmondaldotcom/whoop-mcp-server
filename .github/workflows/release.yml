name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Test
        # setup-uv (with python-version) already creates and activates .venv
        run: |
          uv pip install -e ".[dev]"
          uv run ruff check .
          uv run pytest
      - name: Build
        run: uv build
      - name: GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "whoop-mcp ${GITHUB_REF_NAME}" \
            --generate-notes
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    # Skipped until PyPI "trusted publishing" is configured (see RELEASING.md):
    # set the repo variable PYPI_PUBLISH=true to enable this job.
    if: vars.PYPI_PUBLISH == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
